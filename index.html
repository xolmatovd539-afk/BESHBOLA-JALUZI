<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Early error and unhandled rejection interceptors to silence benign WebSocket/HMR disconnect errors
      (function() {
        const isViteOrWS = (str) => {
          if (!str) return false;
          const s = String(str).toLowerCase();
          return s.includes('websocket') || 
                 s.includes('vite') || 
                 s.includes('hmr') || 
                 s.includes('ws:') || 
                 s.includes('webchannelconnection') || 
                 s.includes('listen') || 
                 s.includes('closed') || 
                 s.includes('opened');
        };

        window.addEventListener('unhandledrejection', (event) => {
          try {
            const reason = event.reason;
            let reasonStr = '';
            if (reason) {
              reasonStr = typeof reason === 'string' 
                ? reason 
                : (reason.message || reason.reason || JSON.stringify(reason) || String(reason));
            }
            if (isViteOrWS(reasonStr) || (reason && (reason.target instanceof WebSocket || reason.target?.constructor?.name === 'WebSocket'))) {
              event.preventDefault();
              event.stopPropagation();
            }
          } catch (e) {
            // Keep error listener from failing
          }
        }, true);

        window.addEventListener('error', (event) => {
          try {
            const error = event.error;
            let errorMsg = '';
            if (error) {
              errorMsg = typeof error === 'string'
                ? error
                : (error.message || error.reason || JSON.stringify(error) || String(error));
            } else if (event.message) {
              errorMsg = event.message;
            }
            if (isViteOrWS(errorMsg) || (event.target && (event.target instanceof WebSocket || event.target?.constructor?.name === 'WebSocket'))) {
              event.preventDefault();
              event.stopPropagation();
            }
          } catch (e) {
            // Keep error listener from failing
          }
        }, true);

        // Intercept and silence benign Firestore connection drop errors and Vite socket logs in console
        const originalError = console.error;
        const originalWarn = console.warn;
        const isBenignMessage = (args) => {
          const msg = args.map(arg => {
            try {
              return typeof arg === 'string' ? arg : JSON.stringify(arg);
            } catch (e) {
              return String(arg);
            }
          }).join(' ').toLowerCase();

          return msg.includes('websocket') || 
                 msg.includes('vite') || 
                 msg.includes('hmr') || 
                 msg.includes('webchannelconnection') || 
                 msg.includes('listen') ||
                 msg.includes('transport error');
        };

        console.error = function(...args) {
          if (isBenignMessage(args)) return;
          originalError.apply(console, args);
        };

        console.warn = function(...args) {
          if (isBenignMessage(args)) return;
          originalWarn.apply(console, args);
        };

        // Intercept WebSocket creation to suppress connection loss issues with local proxy
        const OriginalWS = window.WebSocket;
        if (OriginalWS) {
          const WrappedWS = function(url, protocols) {
            try {
              const ws = new OriginalWS(url, protocols);
              ws.addEventListener('error', (e) => {
                if (isViteOrWS(url)) {
                  e.preventDefault && e.preventDefault();
                  e.stopPropagation && e.stopPropagation();
                }
              });
              return ws;
            } catch (err) {
              console.warn("Wrapped WS instantiation blocked/suppressed:", err);
              // Return a fake minimal socket if it completely crashes on construct
              return {
                addEventListener: () => {},
                removeEventListener: () => {},
                close: () => {},
                send: () => {},
                readyState: 3 // CLOSED
              };
            }
          };
          WrappedWS.prototype = OriginalWS.prototype;
          Object.assign(WrappedWS, OriginalWS);
          window.WebSocket = WrappedWS;
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
